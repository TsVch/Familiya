<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Family Chat MVP</title>
    <style>
      body { font-family: Arial, sans-serif; margin: 0; }
      #auth, #chat-app { padding: 16px; }
      .hidden { display: none; }
      .layout { display: flex; height: calc(100vh - 32px); border: 1px solid #ddd; }
      .sidebar { width: 240px; border-right: 1px solid #ddd; padding: 12px; overflow-y: auto; }
      .chat-pane { flex: 1; display: flex; flex-direction: column; }
      .messages { flex: 1; overflow-y: auto; padding: 12px; background: #fafafa; }
      .message { margin-bottom: 12px; padding: 8px; background: #fff; border: 1px solid #eee; border-radius: 6px; }
      .composer { padding: 12px; border-top: 1px solid #ddd; display: flex; gap: 8px; }
      .composer input[type="text"] { flex: 1; }
      .chat-item { display: block; width: 100%; text-align: left; margin-bottom: 8px; padding: 8px; cursor: pointer; }
      img.preview { max-width: 240px; max-height: 240px; display: block; margin-top: 8px; border-radius: 6px; }
    </style>
  </head>
  <body>
    <div id="auth">
      <h2>Family Chat Login</h2>
      <input id="username" placeholder="Username" />
      <input id="password" type="password" placeholder="Password" />
      <button id="login-btn">Login</button>
      <button id="register-btn">Register</button>
      <p id="auth-status"></p>
    </div>

    <div id="chat-app" class="hidden">
      <div style="margin-bottom: 8px;">
        <strong id="current-user"></strong>
        <button id="logout-btn" style="margin-left: 8px;">Logout</button>
      </div>
      <div class="layout">
        <div class="sidebar">
          <h3>Chats</h3>
          <div id="chat-list"></div>
        </div>
        <div class="chat-pane">
          <div id="messages" class="messages"></div>
          <div class="composer">
            <input id="message-input" type="text" placeholder="Type your message" />
            <input id="file-input" type="file" accept="image/*" />
            <button id="send-btn">Send</button>
          </div>
        </div>
      </div>
    </div>

    <script src="/static/api.js"></script>
    <script src="/static/login.js"></script>
    <script src="/static/chat.js"></script>
  </body>
</html>
